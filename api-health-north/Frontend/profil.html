<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Health North | Mon profil</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <h1>Mon profil</h1>

    <div class="card">
      <h2 style="margin-bottom:10px;">Informations personnelles</h2>

      <label>Nom <input id="nom" required /></label>
      <label>Prénom <input id="prenom" required /></label>
      <label>Email <input id="email" type="email" required /></label>
      <label>Téléphone <input id="telephone" /></label>
      <label>Adresse postale <input id="adressePostale" /></label>

      <button id="saveBtn">Enregistrer</button>
      <p id="msg" class="msg" aria-live="polite"></p>

      <hr style="margin:15px 0;">

      <h2 style="margin-bottom:10px;">Changer le mot de passe</h2>
      <label>Ancien mot de passe <input id="ancienMotDePasse" type="password" /></label>
      <label>Nouveau mot de passe <input id="nouveauMotDePasse" type="password" /></label>

      <button id="pwdBtn">Modifier le mot de passe</button>
      <p id="msgPwd" class="msg" aria-live="polite"></p>

      <button type="button" onclick="goBack()">Retour</button>
    </div>
  </main>

  <script>
    const API_BASE = "http://localhost:3000";
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "index.html";

    const msg = document.getElementById("msg");
    const msgPwd = document.getElementById("msgPwd");

    async function api(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          "Authorization": "Bearer " + token,
          ...(options.headers || {})
        }
      });
      const data = await res.json().catch(() => ({}));
      return { res, data };
    }

    async function loadProfil() {
      msg.textContent = "";
      const { res, data } = await api(`${API_BASE}/me`);
      if (!res.ok) {
        msg.textContent = data.message || data.error || "Erreur chargement profil";
        return;
      }

      document.getElementById("nom").value = data.nom || "";
      document.getElementById("prenom").value = data.prenom || "";
      document.getElementById("email").value = data.email || "";
      document.getElementById("telephone").value = data.telephone || "";
      document.getElementById("adressePostale").value = data.adressePostale || "";
    }

    document.getElementById("saveBtn").addEventListener("click", async () => {
      msg.textContent = "";

      const body = {
        nom: document.getElementById("nom").value.trim(),
        prenom: document.getElementById("prenom").value.trim(),
        email: document.getElementById("email").value.trim(),
        telephone: document.getElementById("telephone").value.trim(),
        adressePostale: document.getElementById("adressePostale").value.trim()
      };

      const { res, data } = await api(`${API_BASE}/me`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        msg.textContent = data.message || data.error || "Erreur mise à jour";
        return;
      }

      msg.style.color = "green";
      msg.textContent = "Profil mis à jour ✅";
      setTimeout(() => { msg.textContent = ""; msg.style.color = "red"; }, 2000);
    });

    document.getElementById("pwdBtn").addEventListener("click", async () => {
      msgPwd.textContent = "";

      const body = {
        ancienMotDePasse: document.getElementById("ancienMotDePasse").value,
        nouveauMotDePasse: document.getElementById("nouveauMotDePasse").value
      };

      const { res, data } = await api(`${API_BASE}/me/password`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        msgPwd.textContent = data.message || data.error || "Erreur changement mot de passe";
        return;
      }

      msgPwd.style.color = "green";
      msgPwd.textContent = "Mot de passe modifié ✅";
      document.getElementById("ancienMotDePasse").value = "";
      document.getElementById("nouveauMotDePasse").value = "";
      setTimeout(() => { msgPwd.textContent = ""; msgPwd.style.color = "red"; }, 2000);
    });

    function goBack() {
      window.location.href = "dashboard.html";
    }

    loadProfil();
  </script>
</body>
</html>
