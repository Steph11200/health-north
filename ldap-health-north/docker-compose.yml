services:
  ldap:
    image: osixia/openldap:1.5.0
    container_name: openldap-health
    environment:
      LDAP_ORGANISATION: "Health North"
      LDAP_DOMAIN: "health.local"
      LDAP_ADMIN_PASSWORD: "admin"
    ports:
      - "389:389"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: phpldapadmin-health
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: ldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
     - "8080:80"
    depends_on:
    - ldap


volumes:
  ldap_data:
  ldap_config:
